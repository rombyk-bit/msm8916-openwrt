name: OpenWrt Builder

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Target device (all = build all devices)'
        required: false
        type: choice
        default: all
        options:
          - all
          - uz801
          - uf02
          - ufi103s

env:
  UPLOAD_FIRMWARE: true
  TZ: Europe/Madrid

jobs:
    resolve-version:
    runs-on: ubuntu-22.04
    outputs:
      openwrt_version: ${{ steps.resolve.outputs.version }}
    steps:
    - name: Resolve latest stable OpenWrt 25.12.x tag
      id: resolve
      run: |
        VERSION=$(git ls-remote --tags https://git.openwrt.org/openwrt/openwrt.git 'v25.12.*' \
          | grep -oP 'v25\.12\.\d+$' | sort -V | tail -1)
        if [ -z "$VERSION" ]; then
          echo "ERROR: Could not resolve a stable OpenWrt 25.12.x version"
          exit 1
        fi
        echo "Resolved OpenWrt version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        

 build:
    needs: resolve-version
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON((inputs.device == 'all' || inputs.device == '') && '["uz801","uf02","ufi103s"]' || format('["{0}"]', inputs.device)) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E ./devenv/dependencies.sh
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt source code
      run: |
        git clone https://openwrt.org openwrt
        git -C openwrt checkout ${{ needs.resolve-version.outputs.openwrt_version }}

    - name: Load msm89xx target and packages
      run: |
        chmod +x apply_patches.sh
        ./apply_patches.sh openwrt
        mv msm89xx openwrt/target/linux/msm89xx
        mv packages openwrt/package/msm8916
        
        # Смена IP на 192.168.15.1
        sed -i 's/192.168.1.1/192.168.15.1/g' openwrt/package/base-files/files/bin/config_generate

        # Настройки сети для UFI103S через echo (без EOF)
        if [ "${{ matrix.device }}" = "ufi103s" ]; then
          echo "Applying custom config for UFI103S..."
          mkdir -p openwrt/files/etc/config
          NET_CONF="openwrt/files/etc/config/network"
          echo "config interface 'loopback'" > $NET_CONF
          echo "    option device 'lo'" >> $NET_CONF
          echo "    option ipaddr '127.0.0.1'" >> $NET_CONF
          echo "    option proto 'static'" >> $NET_CONF
          echo "" >> $NET_CONF
          echo "config device" >> $NET_CONF
          echo "    option name 'br-lan'" >> $NET_CONF
          echo "    option type 'bridge'" >> $NET_CONF
          echo "    list ports 'usb0'" >> $NET_CONF
          echo "" >> $NET_CONF
          echo "config interface 'lan'" >> $NET_CONF
          echo "    option ipaddr '192.168.15.1'" >> $NET_CONF
          echo "    option proto 'static'" >> $NET_CONF
          echo "    option device 'br-lan'" >> $NET_CONF
        fi

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load diffconfig
      run: |
        DEVICE="${{ matrix.device }}"
        DIFFCONFIG="diffconfig_${DEVICE}"
        [ -f "$DIFFCONFIG" ] && cp "$DIFFCONFIG" openwrt/.config || echo "No config found"

    - name: Compile the firmware
      run: |
        cd openwrt
        make defconfig
        make download -j8
        make -j$(nproc) || make -j1 V=s
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files (find logic)
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        mkdir -p firmware_bin
        find openwrt/bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.manifest" -o -name "*.sh" -o -name "*.zip" \) -exec cp {} firmware_bin/ \;
        echo "FIRMWARE=$PWD/firmware_bin" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: openwrt_${{ matrix.device }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}/*
        
