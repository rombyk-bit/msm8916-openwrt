name: OpenWrt Builder

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Target device (all = build all devices)'
        required: false
        type: choice
        default: all
        options:
          - all
          - uz801
          - uf02
          - ufi103s

env:
  UPLOAD_FIRMWARE: true
  TZ: Europe/Madrid

jobs:
  resolve-version:
    runs-on: ubuntu-22.04
    outputs:
      openwrt_version: ${{ steps.resolve.outputs.version }}
    steps:
    - name: Resolve latest stable OpenWrt 25.12.x tag
      id: resolve
      run: |
        VERSION=$(git ls-remote --tags https://git.openwrt.org/openwrt/openwrt.git 'v25.12.*' | grep -oP 'v25\.12\.\d+$' | sort -V | tail -1)
        if [ -z "$VERSION" ]; then
          echo "ERROR: Could not resolve a stable OpenWrt 25.12.x version"
          exit 1
        fi
        echo "Resolved OpenWrt version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: resolve-version
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON((inputs.device == 'all' || inputs.device == '') && '["uz801","uf02","ufi103s"]' || format('["{0}"]', inputs.device)) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E ./devenv/dependencies.sh
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt source code
      run: |
        echo "Using OpenWrt ${{ needs.resolve-version.outputs.openwrt_version }}"
        git clone https://git.openwrt.org/openwrt/openwrt.git openwrt
        git -C openwrt checkout ${{ needs.resolve-version.outputs.openwrt_version }}

    - name: Load msm89xx target and packages
      run: |
        # 1. Скрипт патчинга Wi-Fi
        chmod +x apply_patches.sh
        ./apply_patches.sh openwrt
        
        # 2. Применяем патч таргета для UFI103S (если он есть в папке msm89xx)
        if [ -f "msm89xx/999-add-ufi103s.patch" ]; then
          patch -p1 -d openwrt < msm89xx/999-add-ufi103s.patch
        fi

        # 3. Перенос патчей ядра 6.12 (копируем, чтобы не удалять из корня для матрицы)
        mkdir -p openwrt/target/linux/msm89xx/patches-6.12
        cp msm89xx/*.patch openwrt/target/linux/msm89xx/patches-6.12/ 2>/dev/null || true
        # Удаляем патч таргета из папки патчей ядра
        rm -f openwrt/target/linux/msm89xx/patches-6.12/999-add-ufi103s.patch

        # 4. Перенос DTSI файлов из корня репозитория
        DTS_DEST="openwrt/target/linux/msm89xx/files/arch/arm64/boot/dts/qcom"
        mkdir -p "openwrt/$DTS_DEST"
        cp *.dtsi "openwrt/$DTS_DEST/" 2>/dev/null || true

        # 5. Перенос таргета и пакетов (используем cp вместо mv для работы matrix)
        cp -r msm89xx/* openwrt/target/linux/msm89xx/ 2>/dev/null || true
        cp -r packages openwrt/package/msm8916

        # 6. Добавление профиля ufi103s в Makefile
        cat >> openwrt/target/linux/msm89xx/image/Makefile <<EOF

              define Device/ufi103s
              DEVICE_VENDOR := Wingtech
              DEVICE_MODEL := UFI103S
              DEVICE_DTS := msm8916-ufi103s
              SUPPORTED_DEVICES := ufi103s
              DEVICE_PACKAGES := kmod-wcn36xx wcn36xx-firmware kmod-qcom-rproc-wcnss rmtfs openstick-tweaks wpad-basic-wolfssl qcom-msm8916-modem-openstick-ufi103s-firmware qcom-msm8916-openstick-ufi103s-wcnss-firmware qcom-msm8916-wcnss-openstick-ufi103s-nv
              endef
              TARGET_DEVICES += ufi103s
                 EOF 
          sed -i '/DEVICE_/s/^  */\t/' openwrt/target/linux/msm89xx/image/Makefile
      
    - name: Update and install feeds
      run: |
        cd openwrt
        rm -rf tmp
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load diffconfig
      run: |
        DEVICE="${{ matrix.device }}"
        DIFFCONFIG="diffconfig_${DEVICE}"
        [ -f "$DIFFCONFIG" ] && cp "$DIFFCONFIG" openwrt/.config

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \; || true

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: openwrt_firmware_${{ matrix.device }}_${{needs.resolve-version.outputs.openwrt_version}}_${{ env.FILE_DATE }}
        path: |
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*
          
