name: OpenWrt Builder

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Target device (all = build all devices)'
        required: false
        type: choice
        default: all
        options:
          - all
          - uz801
          - uf02
          - ufi103s

env:
  UPLOAD_FIRMWARE: true
  TZ: Europe/Madrid

jobs:
  resolve-version:
    runs-on: ubuntu-22.04
    outputs:
      openwrt_version: ${{ steps.resolve.outputs.version }}
    steps:
    - name: Resolve latest stable OpenWrt 25.12.x tag
      id: resolve
      run: |
        VERSION=$(git ls-remote --tags https://git.openwrt.org/openwrt/openwrt.git 'v25.12.*' | grep -oP 'v25\.12\.\d+$' | sort -V | tail -1)
        if [ -z "$VERSION" ]; then
          echo "ERROR: Could not resolve a stable OpenWrt 25.12.x version"
          exit 1
        fi
        echo "Resolved OpenWrt version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: resolve-version
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON((inputs.device == 'all' || inputs.device == '') && '["uz801","uf02","ufi103s"]' || format('["{0}"]', inputs.device)) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E ./devenv/dependencies.sh
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt source code
      run: |
        # Увеличиваем буферы для стабильности при больших загрузках
        git config --global http.postBuffer 524288000
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999
        
        # Клонируем только нужную версию с минимальной историей (--depth 1)
        echo "Using OpenWrt ${{ needs.resolve-version.outputs.openwrt_version }}"
        git clone --depth 1 --branch ${{ needs.resolve-version.outputs.openwrt_version }} https://git.openwrt.org/openwrt/openwrt.git openwrt
        

    - name: Load msm89xx target and apply patches
      run: |
        # 1. Применяем патч для Wi-Fi драйверов
        chmod +x "${GITHUB_WORKSPACE}/apply_patches.sh"
        "${GITHUB_WORKSPACE}/apply_patches.sh" "${GITHUB_WORKSPACE}/openwrt"
        
        # 2. Заменяем таргет
        rm -rf "${GITHUB_WORKSPACE}/openwrt/target/linux/msm89xx"
        cp -a "${GITHUB_WORKSPACE}/msm89xx" "${GITHUB_WORKSPACE}/openwrt/target/linux/"
        
        if [ -d "${GITHUB_WORKSPACE}/packages" ]; then
          cp -a "${GITHUB_WORKSPACE}/packages" "${GITHUB_WORKSPACE}/openwrt/package/msm8916"
        fi

        # 3. Скачиваем DTS
        DTS_DIR="${GITHUB_WORKSPACE}/openwrt/target/linux/msm89xx/files/arch/arm64/boot/dts/qcom"
        mkdir -p "$DTS_DIR"
        BASE_URL="https://githubusercontent.com"
        curl -sL "$BASE_URL/msm8916-wingtech-ufi103s.dts" -o "$DTS_DIR/msm8916-wingtech-ufi103s.dts"
        curl -sL "$BASE_URL/msm8916-wingtech-ufi.dtsi" -o "$DTS_DIR/msm8916-wingtech-ufi.dtsi"

        # 4. Регистрируем устройство (безопасный метод через временный файл)
        MAKEFILE_PATH="${GITHUB_WORKSPACE}/openwrt/target/linux/msm89xx/image/Makefile"
        
        # Создаем блок текста
        cat > device_block.txt <<EOF
        define Device/wingtech_ufi103s
        DEVICE_VENDOR := Wingtech
        DEVICE_MODEL := UFI103S
        DEVICE_DTS := msm8916-wingtech-ufi103s
        SUPPORTED_DEVICES := wingtech,ufi103s
        DEVICE_PACKAGES := kmod-wcn36xx wcn36xx-firmware kmod-qcom-rproc-wcnss rmtfs
        endef
        TARGET_DEVICES += wingtech_ufi103s

         EOF
        # Вставляем блок ПЕРЕД строкой BuildImage
        sed -i '/eval.*call BuildImage/r device_block.txt' "$MAKEFILE_PATH"

        # 5. Исправляем diffconfig_ufi103s
        CONF_FILE="${GITHUB_WORKSPACE}/diffconfig_ufi103s"
        if [ -f "$CONF_FILE" ]; then
          sed -i 's/yiming-uz801v3/wingtech_ufi103s/g' "$CONF_FILE"
          {
            echo "CONFIG_PACKAGE_kmod-wcn36xx=y"
            echo "CONFIG_PACKAGE_wcn36xx-firmware=y"
            echo "CONFIG_PACKAGE_kmod-qcom-rproc-wcnss=y"
            echo "CONFIG_PACKAGE_rmtfs=y"
          } >> "$CONF_FILE"
        fi

        echo "Success: All steps completed"
        
    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load diffconfig
      run: |
        DEVICE="${{ matrix.device }}"
        # Если это ufi103s, а файла diffconfig_ufi103s нет, используем конфиг от uz801 как базу
        if [ "$DEVICE" == "ufi103s" ] && [ ! -f "diffconfig_ufi103s" ]; then
          cp diffconfig_uz801 openwrt/.config
          echo "CONFIG_TARGET_DEVICE_msm89xx_DEVICE_wingtech_ufi103s=y" >> openwrt/.config
        else
          [ -f "diffconfig_${DEVICE}" ] && mv "diffconfig_${DEVICE}" openwrt/.config
        fi

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \; || true

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: openwrt_firmware_${{ matrix.device }}_${{needs.resolve-version.outputs.openwrt_version}}_${{ env.FILE_DATE }}
        path: |
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-squashfs-gpt_both0.bin
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-squashfs-boot.img
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-squashfs-system.img
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*.manifest
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-flash.sh
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-firmware.zip

